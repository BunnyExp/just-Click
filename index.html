<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>

    <div id="countdownOverlay" class="countdown-overlay">
        <div class="countdown-card">
            <p class="countdown-label">Loading Birthday Realm</p>
            <h1 id="countdownNumber" class="countdown-number">5</h1>
            <p class="countdown-sub">Get ready, bro...</p>
        </div>
    </div>

    <main class="page-shell" id="mainContent" aria-live="polite">
        <header class="hero">
            <div class="aurora"></div>
            <div class="twinkles" id="twinkles"></div>
            <div class="mc-corners" aria-hidden="true">
                <span class="mc-block tl"></span>
                <span class="mc-block tr"></span>
                <span class="mc-block bl"></span>
                <span class="mc-block br"></span>
            </div>
            <div class="side-decor" aria-hidden="true">
                <div class="cake">
                    <span class="candle"></span>
                    <span class="flame"></span>
                    <span class="icing"></span>
                    <span class="layer layer-top"></span>
                    <span class="layer layer-mid"></span>
                    <span class="layer layer-base"></span>
                </div>
            </div>
            <div class="hero-content">
                <p class="eyebrow">For My Best Friend</p>
                <h1 class="title" id="birthdayTitle">Happy Birthday Valo!</h1>
                <p class="subtitle">Happy Birthday bro! Another year of chaos and wins 😎💥</p>
                <div class="cta-row">
                    <button id="replayBtn" class="btn btn-primary">Replay Party</button>
                    <button id="burstBtn" class="btn btn-secondary">More XP Rain</button>
                </div>
            </div>

            <span class="heart-pop" id="heartPop" aria-hidden="true">&#10084;</span>

            <div class="balloons" aria-hidden="true">
                <span class="balloon b1"></span>
                <span class="balloon b2"></span>
                <span class="balloon b3"></span>
                <span class="balloon b4"></span>
                <span class="balloon b5"></span>
            </div>
        </header>

        <section class="message-panel">
            <h2>A Message For Sadew</h2>
            <p id="typewriter"></p>
        </section>

        <footer class="footer-note">Built with bro energy, block vibes, and birthday wins.</footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
